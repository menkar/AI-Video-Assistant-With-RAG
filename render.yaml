# =============================================================================
#  render.yaml — Render Blueprint for MenkarAI
#  https://render.com/docs/blueprint-spec
#
#  IMPORTANT: Never add real API keys here.
#  Set MISTRAL_API_KEY and SARVAM_API_KEY manually in
#  Render Dashboard → Environment tab.
# =============================================================================

services:
  - type: web
    name: ai-video-assistant-with-rag
    runtime: python
    region: oregon

    # Use 'free' for testing. Upgrade to 'starter' or 'standard' for
    # reliable ML workloads (Whisper needs at least 512 MB RAM).
    plan: free

    # ── Build ─────────────────────────────────────────────────────────────────
    # Install CPU-only PyTorch first (avoids the 2 GB CUDA wheel download),
    # then install the rest of the requirements.
    buildCommand: >-
      pip install --upgrade pip &&
      pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu &&
      pip install -r Requirements.txt

    # ── Start ─────────────────────────────────────────────────────────────────
    startCommand: "bash start.sh"

    # ── Environment Variables ─────────────────────────────────────────────────
    envVars:
      # API keys — set values manually in Render Dashboard, never here
      - key: MISTRAL_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false

      # Whisper model: use 'tiny' on free/starter (low RAM)
      - key: WHISPER_MODEL
        value: tiny

      - key: SARVAM_STT_MODEL
        value: saaras:v3

      # Python version for the build environment
      - key: PYTHON_VERSION
        value: "3.11.9"
