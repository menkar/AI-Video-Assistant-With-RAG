# =============================================================================
#  render.yaml — Render Blueprint for MenkarAI
#  https://render.com/docs/blueprint-spec
#
#  IMPORTANT: Never add real API keys here.
#  Set MISTRAL_API_KEY and SARVAM_API_KEY manually in
#  Render Dashboard → Environment tab.
# =============================================================================

services:
  - type: web
    name: ai-video-assistant-with-rag
    runtime: python
    region: oregon
    plan: free

    # ── Build ─────────────────────────────────────────────────────────────────
    # Uses requirements-cloud.txt which excludes torch/whisper/numba/llvmlite.
    # This keeps the deployment under 512 MB RAM (free tier limit).
    buildCommand: "pip install --upgrade pip && pip install -r requirements-cloud.txt"

    # ── Start ─────────────────────────────────────────────────────────────────
    startCommand: "bash start.sh"

    # ── Environment Variables ─────────────────────────────────────────────────
    envVars:
      # API keys — set values manually in Render Dashboard, never here
      - key: MISTRAL_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false

      # Tells vector_store.py to use Mistral embeddings API instead of
      # local HuggingFace sentence-transformers (saves ~400 MB RAM)
      - key: RENDER
        value: "true"

      - key: WHISPER_MODEL
        value: tiny

      - key: SARVAM_STT_MODEL
        value: saaras:v3

      - key: PYTHON_VERSION
        value: "3.11.9"
