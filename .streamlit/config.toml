# =============================================================================
#  .streamlit/config.toml — Streamlit production config for Render
# =============================================================================

[server]
headless            = true
enableCORS          = false
enableXsrfProtection = false
maxUploadSize       = 500

[browser]
gatherUsageStats = false

[theme]
primaryColor             = "#2563eb"
backgroundColor          = "#f0f4f8"
secondaryBackgroundColor = "#ffffff"
textColor                = "#0f172a"
font                     = "sans serif"
